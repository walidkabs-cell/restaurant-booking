<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bella Tavola - Restaurant Reservation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #c9a227; --dark: #1a1a1a; --light: #f5f5f5; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--light); line-height: 1.6; }
        .hero { min-height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1517248135467-3c8ed17a8d5d?w=1920'); background-size: cover; background-position: center; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 4rem; margin-bottom: 1rem; color: var(--primary); }
        .hero p { font-size: 1.2rem; color: #aaa; max-width: 600px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; text-align: center; margin-bottom: 3rem; color: var(--primary); }
        .booking-form { background: #222; padding: 3rem; border-radius: 16px; max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--primary); font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 1rem; background: #333; border: 1px solid #444; border-radius: 8px; color: #fff; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .btn { display: inline-block; padding: 1rem 2rem; background: var(--primary); color: var(--dark); text-decoration: none; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; font-size: 1rem; width: 100%; }
        .btn:hover { background: #d4af37; transform: translateY(-2px); }
        .tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .table-card { background: #222; padding: 1.5rem; border-radius: 12px; border: 2px solid transparent; transition: all 0.3s; }
        .table-card:hover { border-color: var(--primary); }
        .table-card.selected { border-color: var(--primary); background: #2a2a1a; }
        .table-card h3 { color: var(--primary); margin-bottom: 0.5rem; }
        .table-card p { color: #aaa; font-size: 0.9rem; }
        .success-msg { background: #2a5a2a; padding: 1rem; border-radius: 8px; text-align: center; margin-top: 1rem; display: none; }
        .error-msg { background: #5a2a2a; padding: 1rem; border-radius: 8px; text-align: center; margin-top: 1rem; display: none; }
        footer { text-align: center; padding: 2rem; color: #666; }
        footer a { color: var(--primary); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>La Bella Tavola</h1>
        <p>Experience authentic Italian cuisine in an elegant atmosphere. Reserve your table today.</p>
    </div>
    
    <div class="container">
        <h2 class="section-title">Make a Reservation</h2>
        
        <form class="booking-form" id="bookingForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="customer_name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="customer_email" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="customer_phone" required>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="booking_date" required>
            </div>
            <div class="form-group">
                <label>Time</label>
                <select id="booking_time" required>
                    <option value="">Select time</option>
                    <option value="12:00">12:00 PM</option>
                    <option value="12:30">12:30 PM</option>
                    <option value="13:00">1:00 PM</option>
                    <option value="13:30">1:30 PM</option>
                    <option value="18:00">6:00 PM</option>
                    <option value="18:30">6:30 PM</option>
                    <option value="19:00">7:00 PM</option>
                    <option value="19:30">7:30 PM</option>
                    <option value="20:00">8:00 PM</option>
                    <option value="20:30">8:30 PM</option>
                    <option value="21:00">9:00 PM</option>
                </select>
            </div>
            <div class="form-group">
                <label>Party Size</label>
                <select id="party_size" required>
                    <option value="1">1 person</option>
                    <option value="2" selected>2 people</option>
                    <option value="3">3 people</option>
                    <option value="4">4 people</option>
                    <option value="5">5 people</option>
                    <option value="6">6 people</option>
                    <option value="7">7 people</option>
                    <option value="8">8 people</option>
                </select>
            </div>
            <div class="form-group">
                <label>Select a Table</label>
                <div class="tables-grid" id="tablesGrid"></div>
                <input type="hidden" id="table_id" required>
            </div>
            <div class="form-group">
                <label>Special Requests (optional)</label>
                <textarea id="special_requests" rows="3" placeholder="Allergies, special occasions, etc."></textarea>
            </div>
            <button type="submit" class="btn">Confirm Reservation</button>
            <div class="success-msg" id="successMsg">Reservation confirmed! Check your email for details.</div>
            <div class="error-msg" id="errorMsg">Error making reservation. Please try again.</div>
        </form>
    </div>
    
    <footer>
        <p>© 2026 La Bella Tavola | <a href="/admin">Staff Login</a></p>
    </footer>

    <script>
        const API = '';
        let tables = [];
        
        async function loadTables() {
            const res = await fetch(API + '/api/tables');
            tables = await res.json();
            renderTables(tables);
        }
        
        function renderTables(tables) {
            const grid = document.getElementById('tablesGrid');
            grid.innerHTML = tables.map(t => `
                <div class="table-card" data-id="${t.id}" onclick="selectTable(${t.id})">
                    <h3>${t.name}</h3>
                    <p>${t.capacity} guests • ${t.location}</p>
                </div>
            `).join('');
        }
        
        function selectTable(id) {
            document.querySelectorAll('.table-card').forEach(c => c.classList.remove('selected'));
            document.querySelector(`[data-id="${id}"]`).classList.add('selected');
            document.getElementById('table_id').value = id;
        }
        
        document.getElementById('booking_date').min = new Date().toISOString().split('T')[0];
        
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                customer_name: document.getElementById('customer_name').value,
                customer_email: document.getElementById('customer_email').value,
                customer_phone: document.getElementById('customer_phone').value,
                booking_date: document.getElementById('booking_date').value,
                booking_time: document.getElementById('booking_time').value,
                party_size: parseInt(document.getElementById('party_size').value),
                table_id: parseInt(document.getElementById('table_id').value),
                special_requests: document.getElementById('special_requests').value
            };
            
            if (!data.table_id) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = 'Please select a table';
                return;
            }
            
            try {
                const res = await fetch(API + '/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                
                if (res.ok) {
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('errorMsg').style.display = 'none';
                    document.getElementById('bookingForm').reset();
                    document.querySelectorAll('.table-card').forEach(c => c.classList.remove('selected'));
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = err.message || 'Error making reservation';
            }
        });
        
        loadTables();
    </script>
</body>
</html>
